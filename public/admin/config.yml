# Decap CMS — config pour Cœurs Braves
# Edition Markdown directement vers le repo GitHub.

# En dev local, Decap détecte `localhost` et utilise le proxy local
# (npx decap-server, port 8081) au lieu de GitHub. Ignoré en prod.
local_backend: true

backend:
  name: github
  repo: overbrand/coeurs-braves # à ajuster avec le vrai owner/repo
  branch: main
  # OAuth proxy : à configurer pour un déploiement self-hosted.
  base_url: https://api.netlify.com  # placeholder — à remplacer en prod
  auth_endpoint: auth

site_url: https://coeurs-braves.com
display_url: https://coeurs-braves.com
logo_url: /logo.png

media_folder: public/images/uploads
public_folder: /images/uploads

locale: fr

# Multilingue v1 : FR source, DE et EN en traduction.
# Convention : chaque entry est suffixé `<base-slug>.<locale>.md`.
i18n:
  structure: multiple_files
  default_locale: fr
  locales: [fr, de, en]

collections:
  # ──────────────────────────────────────────────────────────────
  # 1. POLES — les 6 services stratégiques (non créables/supprimables)
  # ──────────────────────────────────────────────────────────────
  - name: poles
    label: Pôles stratégiques (6 services Cœurs Braves)
    folder: src/content/poles
    create: false
    delete: false
    extension: md
    format: yaml-frontmatter
    identifier_field: nom
    summary: "{{nom}} — {{descriptionCourte}}"
    i18n: true
    fields:
      - { name: nom, label: "Nom du pôle", widget: string, i18n: true }
      - {
          name: slug,
          label: "Slug (ne pas modifier)",
          widget: string,
          required: true,
        }
      - { name: emoji, label: "Emoji", widget: string, required: false }
      - {
          name: couleurHex,
          label: "Couleur d'accent (#hex)",
          widget: color,
          allowInput: true,
        }
      - {
          name: descriptionCourte,
          label: "Description courte (≤ 220 car.)",
          widget: text,
          i18n: true,
        }
      - {
          name: descriptionLongue,
          label: "Description longue",
          widget: markdown,
          i18n: true,
        }
      - {
          name: services,
          label: "Services / sous-thèmes",
          widget: list,
          field: { name: item, label: "Service", widget: string },
          i18n: true,
        }
      - {
          name: imageHero,
          label: "Image hero (optionnel)",
          widget: image,
          required: false,
        }
      - { name: ordre, label: "Ordre d'affichage", widget: number, default: 1 }

  # ──────────────────────────────────────────────────────────────
  # 2. PAGES — pages statiques (home, à propos, contact, etc.)
  # ──────────────────────────────────────────────────────────────
  - name: pages
    label: Pages statiques
    label_singular: Page
    folder: src/content/pages
    create: true
    extension: md
    format: yaml-frontmatter
    identifier_field: title
    i18n: true
    fields:
      - { name: title, label: "Titre", widget: string, i18n: true }
      - {
          name: description,
          label: "Description SEO",
          widget: text,
          required: false,
          i18n: true,
        }
      - {
          name: eyebrow,
          label: "Sur-titre / kicker",
          widget: string,
          required: false,
          i18n: true,
        }
      - {
          name: intro,
          label: "Intro",
          widget: text,
          required: false,
          i18n: true,
        }
      - {
          name: baseSlug,
          label: "Base slug (partagé entre locales)",
          widget: string,
          required: false,
        }
      - name: contact
        label: "Bloc Contact (page /contact uniquement)"
        widget: object
        required: false
        i18n: true
        collapsed: true
        fields:
          - { name: audiencesTitle, label: "Titre audiences", widget: string, i18n: true }
          - name: audiences
            label: "Audiences (3 cartes)"
            widget: list
            i18n: true
            fields:
              - { name: title, label: "Titre", widget: string, i18n: true }
              - { name: body, label: "Description", widget: text, i18n: true }
              - { name: cta, label: "CTA", widget: string, i18n: true }
              - { name: href, label: "Lien (mailto: ou URL)", widget: string }
          - { name: coordsTitle, label: "Titre coordonnées", widget: string, i18n: true }
          - { name: officeLabel, label: "Libellé carte bureau", widget: string, required: false, i18n: true }
          - name: headquarters
            label: "Siège"
            widget: object
            i18n: true
            fields:
              - { name: label, label: "Libellé", widget: string, i18n: true }
              - {
                  name: lines,
                  label: "Lignes d'adresse",
                  widget: list,
                  i18n: true,
                  field: { name: line, label: "Ligne", widget: string },
                }
          - name: offices
            label: "Bureaux"
            widget: list
            i18n: true
            fields:
              - { name: city, label: "Ville", widget: string, i18n: true }
              - { name: address, label: "Adresse", widget: string, i18n: true }
              - { name: phone, label: "Téléphone", widget: string, required: false }
          - { name: pressTitle, label: "Titre bloc presse", widget: string, i18n: true }
          - { name: pressBody, label: "Texte bloc presse", widget: text, i18n: true }
          - { name: pressEmail, label: "Email presse", widget: string }

  # ──────────────────────────────────────────────────────────────
  # 2.ter BRANCHES — sous-organisations de Cœurs Braves
  # ──────────────────────────────────────────────────────────────
  - name: branches
    label: Sous-organisations (branches)
    label_singular: Branche
    folder: src/content/branches
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    identifier_field: nom
    summary: "{{nom}} ({{type}})"
    i18n: true
    fields:
      - { name: nom, label: "Nom", widget: string, i18n: true }
      - { name: slug, label: "Slug (partagé entre locales)", widget: string }
      - {
          name: type,
          label: "Type",
          widget: select,
          options:
            [
              association,
              label,
              verein,
              apparel,
              foundation,
              media,
              autre,
            ],
        }
      - { name: pays, label: "Pays", widget: string, required: false, i18n: true }
      - {
          name: descriptionCourte,
          label: "Description courte (≤ 280 car.)",
          widget: text,
          i18n: true,
        }
      - { name: image, label: "Image / visuel", widget: image, required: false }
      - { name: url, label: "Site web (https://...)", widget: string, required: false }
      - { name: ordre, label: "Ordre d'affichage", widget: number, default: 0 }

  # ──────────────────────────────────────────────────────────────
  # 2.quater PARTNERS — partenaires externes
  # ──────────────────────────────────────────────────────────────
  - name: partners
    label: Partenaires
    label_singular: Partenaire
    folder: src/content/partners
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    identifier_field: nom
    summary: "{{nom}} ({{type}})"
    i18n: true
    fields:
      - { name: nom, label: "Nom", widget: string, i18n: true }
      - { name: slug, label: "Slug (partagé entre locales)", widget: string }
      - {
          name: type,
          label: "Type",
          widget: select,
          options:
            [
              institutionnel,
              financier,
              media,
              technologique,
              academique,
              ong,
            ],
        }
      - {
          name: descriptionCourte,
          label: "Description courte (≤ 200 car.)",
          widget: text,
          required: false,
          i18n: true,
        }
      - { name: logo, label: "Logo (PNG/SVG)", widget: image, required: false }
      - { name: url, label: "Site web (https://...)", widget: string, required: false }
      - { name: ordre, label: "Ordre d'affichage", widget: number, default: 0 }

  # ──────────────────────────────────────────────────────────────
  # 2.bis COHORTS — cohortes Raffinerie (non i18n)
  # ──────────────────────────────────────────────────────────────
  - name: cohorts
    label: Cohortes Raffinerie
    label_singular: Cohorte
    folder: src/content/cohorts
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    identifier_field: city
    summary: "Cohorte {{index}} — {{city}} ({{state}})"
    fields:
      - { name: city, label: "Ville", widget: string }
      - { name: index, label: "Numéro (ex. 03)", widget: string }
      - {
          name: state,
          label: "Statut",
          widget: select,
          options: [open, closed, soon],
          default: closed,
        }
      - { name: startDate, label: "Date de début", widget: datetime, required: false }
      - { name: ordre, label: "Ordre d'affichage", widget: number, default: 0 }

  # ──────────────────────────────────────────────────────────────
  # 3. ARTICLES — blog / actualités
  # ──────────────────────────────────────────────────────────────
  - name: articles
    label: Articles & actualités
    label_singular: Article
    folder: src/content/articles
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    identifier_field: titre
    summary: "{{titre}} — {{date | date('YYYY-MM-DD')}}"
    i18n: true
    fields:
      - { name: titre, label: "Titre", widget: string, i18n: true }
      - { name: auteur, label: "Auteur", widget: string }
      - { name: date, label: "Date", widget: datetime }
      - {
          name: categorie,
          label: "Catégorie",
          widget: select,
          options:
            [
              immigration,
              studios-tv,
              fermiers,
              technology,
              academy,
              business,
              general,
            ],
        }
      - {
          name: tags,
          label: "Tags",
          widget: list,
          required: false,
          field: { name: tag, label: "Tag", widget: string },
        }
      - { name: imageCouverture, label: "Image de couverture", widget: image }
      - {
          name: extrait,
          label: "Extrait (≤ 280 car.)",
          widget: text,
          i18n: true,
        }
      - { name: brouillon, label: "Brouillon ?", widget: boolean, default: false }
      - {
          name: baseSlug,
          label: "Base slug (partagé entre locales)",
          widget: string,
          required: false,
        }
      - { name: body, label: "Contenu", widget: markdown, i18n: true }
