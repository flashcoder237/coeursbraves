# =============================================================================
# Cœurs Braves — vhost Nginx pour déploiement VPS
#
# Installation :
#   1. Copier ce fichier dans /etc/nginx/sites-available/coeurs-braves.conf
#   2. ln -s /etc/nginx/sites-available/coeurs-braves.conf /etc/nginx/sites-enabled/
#   3. Adapter `root` au chemin où GitHub Actions déploie (cf. secret VPS_PATH)
#   4. nginx -t  (vérifier la syntaxe)
#   5. systemctl reload nginx
#
# Certificat TLS : utiliser certbot (Let's Encrypt) :
#   sudo certbot --nginx -d coeurs-braves.com -d www.coeurs-braves.com
#
# ⚠ Faire tourner certbot AVANT le premier `nginx -t` : les directives
#   ssl_certificate ci-dessous pointent vers des fichiers qui n'existent pas
#   encore tant que le certificat n'a pas été émis.
# =============================================================================

# ----- Redirection HTTP → HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name coeurs-braves.com www.coeurs-braves.com;
    return 301 https://coeurs-braves.com$request_uri;
}

# ----- Redirection www → apex (HTTPS) -----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.coeurs-braves.com;

    # Mêmes certificats que l'apex (gérés par certbot)
    ssl_certificate     /etc/letsencrypt/live/coeurs-braves.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coeurs-braves.com/privkey.pem;

    return 301 https://coeurs-braves.com$request_uri;
}

# ----- Vhost principal HTTPS -----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name coeurs-braves.com;

    # Racine = dossier où GitHub Actions rsync les fichiers du build dist/
    # Doit correspondre au secret VPS_PATH du workflow.
    root /var/www/coeurs-braves;
    index index.html;

    # ----- TLS (Let's Encrypt via certbot) -----
    ssl_certificate     /etc/letsencrypt/live/coeurs-braves.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coeurs-braves.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # ----- Headers de sécurité -----
    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ----- Compression -----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml application/rss+xml
        image/svg+xml;

    # Brotli (si nginx-extras est installé) — décommenter si dispo
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # ----- Cache long pour assets fingerprintés Astro -----
    location /_astro/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache modéré pour les images
    location ~* \.(jpe?g|png|gif|webp|avif|svg|ico)$ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Cache long pour les fontes
    location ~* \.(woff2?|ttf|otf|eot)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Decap CMS — pas de cache sur l'admin (le JS du CMS doit toujours être à jour)
    location /admin/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        try_files $uri $uri/ $uri.html =404;
    }

    # ----- Routing Astro (URLs en directory format avec trailing slash) -----
    # Le site est multilingue : / (fr), /en/, /de/ — servis comme des pages
    # statiques ordinaires, aucune règle particulière n'est nécessaire.
    location / {
        # Essaie : fichier exact, dossier (avec /index.html), .html, sinon 404
        try_files $uri $uri/ $uri.html $uri/index.html /404.html;
    }

    # ----- 404 personnalisée -----
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Pas de log pour favicon/robots (bruit)
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
