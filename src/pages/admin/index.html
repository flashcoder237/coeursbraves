<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cœurs Braves — Admin</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>❤️</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Cœurs Braves — admin chrome
         Decap CMS est un bundle React figé : on retravaille la palette,
         la typo et la chrome via overrides ciblés. Les sélecteurs
         attribute-contains ([class*="..."]) résistent au hashing CSS de
         Decap mais peuvent casser à un upgrade majeur. */

      :root {
        --paper: #fbfaf7;
        --paper-dark: #f4f1ea;
        --surface: #ffffff;
        --ink: #1c1c1a;
        --ink-soft: #3a3a35;
        --ink-mute: #6b6b63;
        --accent-green: #0f9d58;
        --accent-red: #d9381e;
        --accent-ochre: #e59819;
        --hairline: #eae7df;
      }

      html, body, #nc-root {
        background: var(--paper) !important;
        color: var(--ink);
        font-family: "Plus Jakarta Sans", system-ui, sans-serif !important;
        -webkit-font-smoothing: antialiased;
      }

      /* Top app header — fond paper avec hairline */
      [class*="AppHeader"] {
        background: var(--surface) !important;
        border-bottom: 1px solid var(--hairline) !important;
        box-shadow: 0 4px 24px -16px rgba(0,0,0,0.06) !important;
      }
      [class*="AppHeader"] a,
      [class*="AppHeader"] button,
      [class*="AppHeader"] [class*="AppHeaderNavLink"] {
        color: var(--ink-soft) !important;
      }
      [class*="AppHeaderNavLink"]:hover,
      [class*="AppHeaderNavLink"][class*="active"] {
        color: var(--ink) !important;
      }

      /* Sidebar collections list */
      [class*="SidebarNavList"] a {
        color: var(--ink-soft) !important;
        border-radius: 10px !important;
        font-weight: 500 !important;
      }
      [class*="SidebarNavList"] a:hover { background: var(--paper-dark) !important; color: var(--ink) !important; }
      [class*="SidebarNavList"] a[class*="active"] {
        background: var(--ink) !important;
        color: var(--paper) !important;
      }

      /* Buttons — accent ocre pour primaire */
      button[class*="primary"],
      button[type="submit"]:not([class*="secondary"]) {
        background: var(--ink) !important;
        color: var(--paper) !important;
        border-radius: 999px !important;
        font-weight: 500 !important;
        letter-spacing: -0.005em;
      }
      button[class*="primary"]:hover {
        background: var(--accent-ochre) !important;
        color: var(--ink) !important;
      }

      /* Champs de saisie */
      input[type="text"], input[type="number"], input[type="email"], textarea, [contenteditable] {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif !important;
        color: var(--ink) !important;
      }

      /* Cards et zones d'entry list */
      [class*="Card"], [class*="EntryCard"] {
        background: var(--surface) !important;
        border: 1px solid var(--hairline) !important;
        border-radius: 14px !important;
        box-shadow: 0 8px 32px -16px rgba(0,0,0,0.04) !important;
      }
      [class*="EntryCard"]:hover { border-color: var(--ink-mute) !important; }

      /* Headings (titre d'écran, collections) */
      h1, h2, h3, [class*="Heading"] {
        font-family: "Plus Jakarta Sans", system-ui, sans-serif !important;
        color: var(--ink) !important;
        letter-spacing: -0.02em;
      }

      /* Selection ocre — signature du site */
      ::selection { background-color: var(--accent-ochre); color: var(--ink); }

      /* Scrollbar sobre */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--ink-mute); }

      /* Loader splash — couleur de fond avant mount */
      body::before {
        content: "";
        position: fixed; inset: 0;
        background: var(--paper);
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      /* Cœurs Braves — extensions Decap
         - Preview templates pour pages et articles (rendu fidèle au site)
         - Editor components Markdown : Callout, Pullquote
         - Preview style chargé depuis /admin/preview.css */

      (function waitForCMS() {
        if (!window.CMS) return setTimeout(waitForCMS, 50);

        CMS.registerPreviewStyle("/admin/preview.css");

        const h = window.h || (window.CMS && CMS.h) || null;

        // Utilitaire : convertit le markdown body en HTML (Decap expose widgetFor)
        function renderEntry(entry, getAsset, body, opts = {}) {
          const data = entry.getIn(["data"]) ? entry.getIn(["data"]).toJS() : {};
          const eyebrow = data.eyebrow || opts.eyebrow || null;
          const title = data.title || data.titre || data.nom || "(sans titre)";
          const intro = data.intro || data.extrait || data.descriptionCourte || null;
          const cover = data.imageCouverture || data.imageHero || data.image || null;
          const meta = opts.meta || null;

          return h("article", { className: "cb-preview" },
            eyebrow && h("p", { className: "cb-eyebrow" }, eyebrow),
            meta && h("div", { className: "cb-meta" }, h("span", { className: "dot" }), meta),
            h("h1", { className: "cb-h1" }, title),
            intro && h("p", { className: "cb-intro" }, intro),
            cover && h("img", { className: "cb-cover", src: getAsset(cover).toString() }),
            body
              ? h("div", { className: "cb-body" }, body)
              : h("div", { className: "cb-empty" }, "Écrivez le contenu — il s'affichera ici en temps réel.")
          );
        }

        // ── Pages statiques ────────────────────────────────────────
        CMS.registerPreviewTemplate("pages", function PagePreview(props) {
          const { entry, widgetFor, getAsset } = props;
          return renderEntry(entry, getAsset, widgetFor("body"));
        });

        // ── Articles & actualités ──────────────────────────────────
        CMS.registerPreviewTemplate("articles", function ArticlePreview(props) {
          const { entry, widgetFor, getAsset } = props;
          const data = entry.getIn(["data"]).toJS();
          const date = data.date ? new Date(data.date).toLocaleDateString("fr-FR", { year: "numeric", month: "long", day: "numeric" }) : null;
          const meta = [data.categorie, date, data.auteur].filter(Boolean).join(" · ");
          return renderEntry(entry, getAsset, widgetFor("body"), { meta });
        });

        // ── Pôles ──────────────────────────────────────────────────
        CMS.registerPreviewTemplate("poles", function PolePreview(props) {
          const { entry, widgetFor, getAsset } = props;
          const data = entry.getIn(["data"]).toJS();
          return renderEntry(entry, getAsset, widgetFor("descriptionLongue"), {
            eyebrow: "Pôle stratégique",
            meta: data.services ? data.services.slice(0, 3).join(" / ") : null,
          });
        });

        // ── Editor component : Callout ─────────────────────────────
        CMS.registerEditorComponent({
          id: "callout",
          label: "Callout (encadré)",
          fields: [
            { name: "tone", label: "Ton", widget: "select", options: ["ocre", "vert", "rouge"], default: "ocre" },
            { name: "label", label: "Libellé court", widget: "string", required: false },
            { name: "text", label: "Texte", widget: "text" },
          ],
          pattern: /^:::callout\{tone=([^}]+)(?:\s+label="([^"]*)")?\}\n([\s\S]*?)\n:::/m,
          fromBlock: function (match) {
            return { tone: match[1], label: match[2] || "", text: match[3] };
          },
          toBlock: function (obj) {
            const lbl = obj.label ? ` label="${obj.label}"` : "";
            return `:::callout{tone=${obj.tone || "ocre"}${lbl}}\n${obj.text}\n:::`;
          },
          toPreview: function (obj) {
            const cls = obj.tone === "vert" ? "cb-callout-green" : obj.tone === "rouge" ? "cb-callout-red" : "";
            const label = obj.label ? `<span class="cb-callout-label">${obj.label}</span>` : "";
            return `<div class="cb-callout ${cls}">${label}${(obj.text || "").replace(/\n/g, "<br/>")}</div>`;
          },
        });

        // ── Editor component : Pullquote ───────────────────────────
        CMS.registerEditorComponent({
          id: "pullquote",
          label: "Citation (pullquote)",
          fields: [
            { name: "quote", label: "Citation", widget: "text" },
            { name: "author", label: "Auteur·rice", widget: "string", required: false },
          ],
          pattern: /^:::pullquote(?:\{author="([^"]*)"\})?\n([\s\S]*?)\n:::/m,
          fromBlock: function (match) {
            return { author: match[1] || "", quote: match[2] };
          },
          toBlock: function (obj) {
            const a = obj.author ? `{author="${obj.author}"}` : "";
            return `:::pullquote${a}\n${obj.quote}\n:::`;
          },
          toPreview: function (obj) {
            const a = obj.author ? `<span class="cb-pullquote-author">— ${obj.author}</span>` : "";
            return `<blockquote class="cb-pullquote">${obj.quote || ""}${a}</blockquote>`;
          },
        });
      })();
    </script>
  </body>
</html>
